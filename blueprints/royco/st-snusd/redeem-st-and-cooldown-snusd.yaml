protocol: "royco-st-snusd"

# Royco Senior Tranche sNUSD — Redeem ST & Cooldown sNUSD
# Redeem ST shares to get sNUSD, then initiate sNUSD cooldown
#
# Flow: balanceOf sNUSD (before) -> balanceOf ST -> mulDiv (bps) -> redeem ST
#       -> balanceOf sNUSD (after) -> sub -> cooldownShares
#
# After this step, sNUSD is locked in silo with a 10-day cooldown timer.
# Must wait for cooldown to expire before executing withdraw-snusd-usdc-*.
#
# Prerequisites:
#   - Caliber must have AccessManager role (15192588971413990205)
#     on 0xD567cCbb336Eb71eC2537057E2bCF6DB840bB71d
#
# 8 calls total

constants:
  context_helper_address:
    type: "address"
    value: "0x0f431322E1fF2500D4C5a4E090A7Da7344F953BE"
  unsigned_math_helper_address:
    type: "address"
    value: "0x3D623B199E290358416415eA7e05B635E442e3c0"
  snusd_address:
    type: "address"
    value: "0x08EFCC2F3e61185D0EA7F8830B3FEc9Bfa2EE313"
  senior_tranche_address:
    type: "address"
    value: "0x3B2df77f0eaA0CA98aAabFFa96B03eaF08ec6c8e"

inputs: {}

actions:
  redeem_st_and_cooldown_snusd:
    calls:
      # 1. Get caliber address
      - description: "Get caliber's address"
        target: ${constants.context_helper_address}
        selector: "msgSender()"
        parameters: []
        return:
          name: "caliber_address"
          type: "address"

      # 2. Get sNUSD balance BEFORE redeem (to sandwich)
      - description: "Get sNUSD balance before ST redeem"
        target: "${constants.snusd_address}"
        selector: "balanceOf(address)"
        parameters:
          - type: "address"
            value: "${returns.caliber_address}"
        return:
          name: "snusd_before"
          type: "uint256"

      # 3. Get ST share balance
      - description: "Get Senior Tranche share balance"
        target: "${constants.senior_tranche_address}"
        selector: "balanceOf(address)"
        parameters:
          - type: "address"
            value: "${returns.caliber_address}"
        return:
          name: "st_shares"
          type: "uint256"

      # 4. Calculate shares to redeem from bps
      - description: "Calculate shares to redeem based on basis points"
        target: "${constants.unsigned_math_helper_address}"
        selector: "mulDiv(uint256,uint256,uint256)"
        parameters:
          - type: "uint256"
            value: "${returns.st_shares}"
          - type: "uint256"
            value: "${input_slots.bps_to_redeem}"
          - type: "uint256"
            value: "10000"
        return:
          name: "shares_to_redeem"
          type: "uint256"

      # 5. Redeem ST shares to get sNUSD
      - description: "Redeem Senior Tranche shares to receive sNUSD"
        target: "${constants.senior_tranche_address}"
        selector: "redeem(uint256,address,address)"
        parameters:
          - type: "uint256"
            value: "${returns.shares_to_redeem}"
          - type: "address"
            value: "${returns.caliber_address}"
          - type: "address"
            value: "${returns.caliber_address}"

      # 6. Get sNUSD balance AFTER redeem
      - description: "Get sNUSD balance after ST redeem"
        target: "${constants.snusd_address}"
        selector: "balanceOf(address)"
        parameters:
          - type: "address"
            value: "${returns.caliber_address}"
        return:
          name: "snusd_after"
          type: "uint256"

      # 7. Calculate sNUSD received from redeem (after - before)
      - description: "Calculate sNUSD received from ST redeem"
        target: "${constants.unsigned_math_helper_address}"
        selector: "sub(uint256,uint256)"
        parameters:
          - type: "uint256"
            value: "${returns.snusd_after}"
          - type: "uint256"
            value: "${returns.snusd_before}"
        return:
          name: "snusd_received"
          type: "uint256"

      # 8. Initiate sNUSD cooldown (locks sNUSD, starts 10-day timer)
      - description: "Initiate sNUSD cooldown to lock shares for unstaking"
        target: "${constants.snusd_address}"
        selector: "cooldownShares(uint256)"
        parameters:
          - type: "uint256"
            value: "${returns.snusd_received}"

    input_slots:
      bps_to_redeem:
        type: "uint256"
        description: "Basis points of ST shares to redeem (10000 = 100%)"
