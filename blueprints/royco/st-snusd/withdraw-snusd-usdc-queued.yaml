protocol: "royco-st-snusd"

# Royco Senior Tranche sNUSD — Withdraw sNUSD to USDC (Queued)
# Unstake sNUSD after cooldown expires, then request queued NUSD redemption via Router
# Stores the redemption request ID in KV store for accounting to track
#
# Flow: check no pending request -> unstake sNUSD -> balance sandwich NUSD
#       -> verify queued mode -> read next requestId -> approve NUSD -> Router.redeem
#       -> store flag + request ID in KV
#
# The keeper will fulfill the request later via serveRedemptionRequest(id)
# If not fulfilled within 7 days, can be cancelled via cancelExpiredRedemptionRequest(id)
#
# Prerequisites:
#   - block.timestamp >= cooldownEnd (10 days after redeem-st-and-cooldown-snusd)
#   - Caliber must be whitelisted on NUSD Router for redeem
#   - No existing pending redemption request (tracked via KV store)
#
# 16 calls total

constants:
  context_helper_address:
    type: "address"
    value: "0x0f431322E1fF2500D4C5a4E090A7Da7344F953BE"
  unsigned_math_helper_address:
    type: "address"
    value: "0x3D623B199E290358416415eA7e05B635E442e3c0"
  boolean_helper_address:
    type: "address"
    value: "0x00c93e3b09Ca2f544487d4298339765EadCD8353"
  usdc_address:
    type: "address"
    value: "0xA0b86991c6218b36c1d19D4a2e9Eb0cE3606eB48"
  nusd_address:
    type: "address"
    value: "0xE556ABa6fe6036275Ec1f87eda296BE72C811BCE"
  nusd_router_address:
    type: "address"
    value: "0xa052883ebEe7354FC2Aa0f9c727E657FdeCa744a"
  snusd_address:
    type: "address"
    value: "0x08EFCC2F3e61185D0EA7F8830B3FEc9Bfa2EE313"

inputs:
  key_value_store_address:
    type: "address"
  pending_flag_key:
    type: "bytes32"
  request_id_key:
    type: "bytes32"

actions:
  withdraw_snusd_usdc_queued:
    calls:
      # 1. Get caliber address
      - description: "Get caliber's address"
        target: ${constants.context_helper_address}
        selector: "msgSender()"
        parameters: []
        return:
          name: "caliber_address"
          type: "address"

      # 2. Check no existing pending request (flag == 0)
      - description: "Get pending request flag from KV store"
        target: "${inputs.key_value_store_address}"
        selector: "get(bytes32)"
        parameters:
          - type: "bytes32"
            value: "${inputs.pending_flag_key}"
        return:
          name: "existing_flag"
          type: "uint256"

      # 3. Verify no pending request
      - description: "Check no existing pending redemption request"
        target: "${constants.unsigned_math_helper_address}"
        selector: "eq(uint256,uint256)"
        parameters:
          - type: "uint256"
            value: "${returns.existing_flag}"
          - type: "uint256"
            value: "0"
        return:
          name: "no_pending"
          type: "bool"

      # 4. Revert if already have a pending request
      - description: "Revert if pending redemption request exists"
        target: "${constants.boolean_helper_address}"
        selector: "revertIfFalse(bool)"
        parameters:
          - type: "bool"
            value: "${returns.no_pending}"

      # 5. NUSD balance before unstake (balance sandwich)
      - description: "Get NUSD balance before unstake"
        target: "${constants.nusd_address}"
        selector: "balanceOf(address)"
        parameters:
          - type: "address"
            value: "${returns.caliber_address}"
        return:
          name: "nusd_balance_before"
          type: "uint256"

      # 6. Unstake sNUSD (transfers NUSD from silo to caliber)
      - description: "Unstake sNUSD after cooldown to receive NUSD"
        target: "${constants.snusd_address}"
        selector: "unstake(address)"
        parameters:
          - type: "address"
            value: "${returns.caliber_address}"

      # 7. NUSD balance after unstake
      - description: "Get NUSD balance after unstake"
        target: "${constants.nusd_address}"
        selector: "balanceOf(address)"
        parameters:
          - type: "address"
            value: "${returns.caliber_address}"
        return:
          name: "nusd_balance_after"
          type: "uint256"

      # 8. Calculate NUSD received (after - before)
      - description: "Calculate NUSD received from unstake"
        target: "${constants.unsigned_math_helper_address}"
        selector: "sub(uint256,uint256)"
        parameters:
          - type: "uint256"
            value: "${returns.nusd_balance_after}"
          - type: "uint256"
            value: "${returns.nusd_balance_before}"
        return:
          name: "nusd_balance"
          type: "uint256"

      # 9. Check redemption mode is QUEUED (> 0)
      - description: "Check Router redemption mode for NUSD amount"
        target: "${constants.nusd_router_address}"
        selector: "getRedemptionMode(address,uint256)"
        parameters:
          - type: "address"
            value: "${constants.usdc_address}"
          - type: "uint256"
            value: "${returns.nusd_balance}"
        return:
          name: "redemption_mode"
          type: "uint256"

      # 10. Verify mode is QUEUED (> 0)
      - description: "Check redemption mode is QUEUED"
        target: "${constants.unsigned_math_helper_address}"
        selector: "gt(uint256,uint256)"
        parameters:
          - type: "uint256"
            value: "${returns.redemption_mode}"
          - type: "uint256"
            value: "0"
        return:
          name: "is_queued"
          type: "bool"

      # 11. Revert if instant (use withdraw-step2 instant variant instead)
      - description: "Revert if redemption would be instant"
        target: "${constants.boolean_helper_address}"
        selector: "revertIfFalse(bool)"
        parameters:
          - type: "bool"
            value: "${returns.is_queued}"

      # 12. Read next redemption request ID (will be assigned to our request)
      - description: "Get next redemption request ID from Router"
        target: "${constants.nusd_router_address}"
        selector: "redemptionRequestId()"
        parameters: []
        return:
          name: "next_request_id"
          type: "uint256"

      # 13. Approve NUSD to Router
      - description: "Approve NUSD spending by Neutrl Router"
        target: "${constants.nusd_address}"
        selector: "approve(address,uint256)"
        parameters:
          - type: "address"
            value: "${constants.nusd_router_address}"
          - type: "uint256"
            value: "${returns.nusd_balance}"

      # 14. Redeem NUSD via Router (will create queued request)
      # minCollateralAmount MUST be > 0 (at least 1), otherwise reverts with ZeroInput
      - description: "Redeem NUSD to USDC via Neutrl Router (queued)"
        target: "${constants.nusd_router_address}"
        selector: "redeem(address,address,uint256,uint256,bytes)"
        parameters:
          - type: "address"
            value: "${returns.caliber_address}"
          - type: "address"
            value: "${constants.usdc_address}"
          - type: "uint256"
            value: "${returns.nusd_balance}"
          - type: "uint256"
            value: "${input_slots.min_usdc_expected}"
          - type: "bytes"
            value: "0x"

      # 15. Store pending flag in KV store
      - description: "Set pending redemption flag in KV store"
        target: "${inputs.key_value_store_address}"
        selector: "set(bytes32,bytes32)"
        parameters:
          - type: "bytes32"
            value: "${inputs.pending_flag_key}"
          - type: "uint256"
            value: "1"

      # 16. Store request ID in KV store
      - description: "Store redemption request ID in KV store"
        target: "${inputs.key_value_store_address}"
        selector: "set(bytes32,bytes32)"
        parameters:
          - type: "bytes32"
            value: "${inputs.request_id_key}"
          - type: "uint256"
            value: "${returns.next_request_id}"

    input_slots:
      min_usdc_expected:
        type: "uint256"
        description: "Min USDC expected to receive incl decimals (6)"
