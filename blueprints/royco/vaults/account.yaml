protocol: "royco"

# Royco DSV Account Blueprint
# Hybrid pricing: tracks live share price during open/closed epochs,
# uses locked settlement price after processEpoch.
#
# No pending (epoch_id=0): convertToAssets(active_shares)
# Open/Closed epoch:       convertToAssets(active_shares + pending_shares)
# Processed epoch:          convertToAssets(active_shares) + getUserEpochRequestInAssets(caliber, epochID)

constants:
  context_helper_address:
    type: "address"
    value: "0x0f431322E1fF2500D4C5a4E090A7Da7344F953BE"
  math_helper_address:
    type: "address"
    value: "0x3D623B199E290358416415eA7e05B635E442e3c0"
  boolean_helper_address:
    type: "address"
    value: "0x00c93e3b09Ca2f544487d4298339765EadCD8353"

inputs:
  vault_address:
    type: "address"
  kv_store_address:
    type: "address"
  kv_storage_key:
    type: "bytes32"
  kv_pending_shares_key:
    type: "bytes32"

actions:
  account:
    calls:
      - description: "Get caliber's address"
        target: ${constants.context_helper_address}
        selector: "msgSender()"
        parameters: []
        return:
          name: "caliber_address"
          type: "address"

      # Get raw data
      - description: "Get share balance held by caliber"
        target: "${inputs.vault_address}"
        selector: "balanceOf(address)"
        parameters:
          - type: "address"
            value: "${returns.caliber_address}"
        return:
          name: "active_shares"
          type: "uint256"

      - description: "Get pending shares from KV store (0 if none)"
        target: "${inputs.kv_store_address}"
        selector: "get(bytes32)"
        parameters:
          - type: "bytes32"
            value: "${inputs.kv_pending_shares_key}"
        return:
          name: "pending_shares"
          type: "uint256"

      - description: "Get epoch ID from KV store (0 if no pending)"
        target: "${inputs.kv_store_address}"
        selector: "get(bytes32)"
        parameters:
          - type: "bytes32"
            value: "${inputs.kv_storage_key}"
        return:
          name: "epoch_id"
          type: "uint256"

      # UNPROCESSED path: add shares first, convert once (no rounding split)
      - description: "Sum active + pending shares"
        target: "${constants.math_helper_address}"
        selector: "add(uint256,uint256)"
        parameters:
          - type: "uint256"
            value: "${returns.active_shares}"
          - type: "uint256"
            value: "${returns.pending_shares}"
        return:
          name: "total_shares"
          type: "uint256"

      - description: "Convert total shares to USDC (unprocessed path)"
        target: "${inputs.vault_address}"
        selector: "convertToAssets(uint256)"
        parameters:
          - type: "uint256"
            value: "${returns.total_shares}"
        return:
          name: "value_unprocessed"
          type: "uint256"

      # PROCESSED path: active value + locked settlement value
      - description: "Convert active shares to USDC (processed path)"
        target: "${inputs.vault_address}"
        selector: "convertToAssets(uint256)"
        parameters:
          - type: "uint256"
            value: "${returns.active_shares}"
        return:
          name: "active_value"
          type: "uint256"

      - description: "Get settled pending value from vault (0 if not processed)"
        target: "${inputs.vault_address}"
        selector: "getUserEpochRequestInAssets(address,uint256)"
        parameters:
          - type: "address"
            value: "${returns.caliber_address}"
          - type: "uint256"
            value: "${returns.epoch_id}"
        return:
          name: "settled_pending_value"
          type: "uint256"

      - description: "Sum active + settled pending (processed path)"
        target: "${constants.math_helper_address}"
        selector: "add(uint256,uint256)"
        parameters:
          - type: "uint256"
            value: "${returns.active_value}"
          - type: "uint256"
            value: "${returns.settled_pending_value}"
        return:
          name: "value_processed"
          type: "uint256"

      # Determine which path to use via epoch state
      - description: "Check if epoch ID is zero (no pending)"
        target: "${constants.math_helper_address}"
        selector: "eq(uint256,uint256)"
        parameters:
          - type: "uint256"
            value: "${returns.epoch_id}"
          - type: "uint256"
            value: "0"
        return:
          name: "is_no_pending"
          type: "bool"

      - description: "Check if there is a pending epoch"
        target: "${constants.boolean_helper_address}"
        selector: "not(bool)"
        parameters:
          - type: "bool"
            value: "${returns.is_no_pending}"
        return:
          name: "has_pending"
          type: "bool"

      - description: "Get epoch state (0=Inactive, 1=Open, 2=Processing, 3=Processed)"
        target: "${inputs.vault_address}"
        selector: "getEpochState(uint256)"
        parameters:
          - type: "uint256"
            value: "${returns.epoch_id}"
        return:
          name: "epoch_state"
          type: "uint256"

      - description: "Check if epoch is processed (state == 3)"
        target: "${constants.math_helper_address}"
        selector: "eq(uint256,uint256)"
        parameters:
          - type: "uint256"
            value: "${returns.epoch_state}"
          - type: "uint256"
            value: "3"
        return:
          name: "is_state_processed"
          type: "bool"

      - description: "Use settled path only if has pending AND epoch is processed"
        target: "${constants.boolean_helper_address}"
        selector: "and(bool,bool)"
        parameters:
          - type: "bool"
            value: "${returns.has_pending}"
          - type: "bool"
            value: "${returns.is_state_processed}"
        return:
          name: "use_settled"
          type: "bool"

      # Select the correct value
      - description: "Pick processed or unprocessed value"
        target: "${constants.math_helper_address}"
        selector: "ternary(bool,uint256,uint256)"
        parameters:
          - type: "bool"
            value: "${returns.use_settled}"
          - type: "uint256"
            value: "${returns.value_processed}"
          - type: "uint256"
            value: "${returns.value_unprocessed}"
        return:
          name: "total_value_usdc"
          type: "uint256"

    reserved_slots:
      - type: "uint256"
        value: "${returns.total_value_usdc}"
      - type: "uint256"
        value: "${builtins.UINT256_MAX}"
